# Alembic configuration for ui-blueprint backend
# Run from the repository root:
#   alembic -c backend/alembic.ini upgrade head

[alembic]
script_location = backend/alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL is read from the environment; override here only for local tooling.
sqlalchemy.url = ${DATABASE_URL}

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
